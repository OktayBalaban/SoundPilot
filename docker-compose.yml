services:
  storage:
    build:
      context: ./backend/storage
    container_name: soundpilot_storage
    ports:
      - "8001:8001"
    volumes:
      - ./backend/storage/data:/app/data
    restart: unless-stopped

  processor:
    build:
      context: ./backend/processor
    container_name: soundpilot_processor
    ports:
      - "8000:8000"
    environment:
      - STORAGE_API_BASE_URL=http://storage:8001
    depends_on:
      - storage
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ./frontend
    container_name: soundpilot_frontend
    ports:
      - "3000:3000"
    environment:
      - ORIGIN=http://localhost:3000
      - HOST=0.0.0.0
      - PUBLIC_PROCESSOR_API_BASE_URL=http://localhost:8000
      - INTERNAL_PROCESSOR_API_URL=http://processor:8000
    depends_on:
      - processor
    restart: unless-stopped